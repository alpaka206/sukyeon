# 석연MRO 콘텐츠 관리 설정 (Sveltia/Decap CMS)
# base_url 은 실제 배포 도메인. 도메인이 바뀌면 여기와 GitHub OAuth App 콜백 URL을 함께 변경하세요.
backend:
  name: github
  repo: alpaka206/sukyeon
  branch: main
  base_url: https://sukyeon.vercel.app
  auth_endpoint: api/oauth

# 업로드한 PDF·이미지가 저장되는 위치(=public/assets), 사이트에서 참조하는 경로(=/assets)
media_folder: public/assets
public_folder: /assets

locale: ko

collections:
  # 1) 공지사항
  - name: news
    label: 공지사항
    files:
      - name: list
        label: 공지사항 목록
        file: src/content/news.json
        fields:
          - name: items
            label: 공지
            label_singular: 공지
            widget: list
            summary: "{{fields.date}} · {{fields.title}}"
            fields:
              - { name: category, label: 분류, widget: select, options: ["자료", "제품", "인증", "일반"], default: "일반" }
              - { name: title, label: 제목, widget: string }
              - { name: date, label: 날짜, widget: string, hint: "예: 2026.05.20" }
              - { name: accent, label: 강조(파란 뱃지로 표시), widget: boolean, default: false }

  # 2) 자료실 (MSDS · 시험성적서)
  - name: docs
    label: 자료실(MSDS·시험성적서)
    files:
      - name: list
        label: 자료 목록
        file: src/content/docs.json
        fields:
          - name: items
            label: 자료
            label_singular: 자료
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: 자료명, widget: string }
              - { name: category, label: 분류, widget: string, hint: "예: 이형제 / 프란자오일 / 시험성적서" }
              - { name: date, label: 등록일, widget: string, hint: "예: 2026.05" }
              - { name: file, label: PDF 파일, widget: file, required: false, hint: "PDF를 올리면 다운로드 버튼이 생깁니다" }

  # 3) 카탈로그 (PDF)
  - name: catalog
    label: 카탈로그
    files:
      - name: catalog
        label: 카탈로그
        file: src/content/catalog.json
        fields:
          - { name: title, label: 제목, widget: string }
          - { name: tagline, label: 표지 부제, widget: string, hint: "예: CAST ONE · LUBE ONE · 2026" }
          - { name: file, label: 카탈로그 PDF, widget: file }

  # 4) 인증·특허
  - name: certs
    label: 인증·특허
    files:
      - name: list
        label: 인증 목록
        file: src/content/certs.json
        fields:
          - name: items
            label: 인증
            label_singular: 인증
            widget: list
            summary: "{{fields.title}} ({{fields.standard}})"
            fields:
              - { name: eyebrow, label: 영문 라벨, widget: string, hint: "예: QUALITY / ENVIRONMENT" }
              - { name: title, label: 인증명, widget: string }
              - { name: standard, label: 표준규격, widget: string }
              - { name: desc, label: 설명, widget: text }
              - { name: issuer, label: 인증기관, widget: string }
              - { name: number, label: 인증번호, widget: string }
              - { name: scope, label: 인증범위, widget: string }
              - { name: validity, label: 유효기간, widget: string }
              - { name: imageKo, label: 국문 인증서 이미지, widget: image }
              - { name: imageEn, label: 영문 인증서 이미지, widget: image }
